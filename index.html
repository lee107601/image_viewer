<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>댕이♥몽이</title>
  <meta property="og:title" content="댕이♥몽이" />
  <meta property="og:description" content="댕이♥몽이" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2e2e42;
      --accent: #7c6af7;
      --accent2: #f76aa8;
      --text: #e8e8f0;
      --muted: #7878a0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      padding: 1.2rem 1.5rem;
      display: flex; align-items: center; gap: .8rem;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,19,.9);
      backdrop-filter: blur(12px);
    }
    .logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 1rem; flex-shrink: 0;
    }
    header h1 { font-size: 1.15rem; font-weight: 700; }
    #header-count { color: var(--muted); font-size: .8rem; margin-left: auto; }

    /* ── 로딩 ── */
    #status { text-align: center; padding: 5rem 2rem; color: var(--muted); }
    #status.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 툴바 ── */
    #toolbar {
      display: none; max-width: 1400px; margin: 0 auto;
      padding: .7rem 1.2rem; align-items: center; gap: .6rem; flex-wrap: wrap;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 57px; z-index: 90;
    }
    #toolbar.visible { display: flex; }
    #count { color: var(--muted); font-size: .82rem; }
    .spacer { flex: 1; }
    .sort-select {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: .4rem .7rem; font-size: .82rem; cursor: pointer; min-height: 36px;
    }
    .cols-btn { display: flex; gap: .35rem; }
    .cols-btn button {
      background: var(--bg); color: var(--muted);
      border: 1px solid var(--border); border-radius: 6px;
      padding: .35rem .65rem; font-size: .78rem;
      cursor: pointer; transition: all .15s; min-height: 36px;
    }
    .cols-btn button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── 갤러리 ── */
    #gallery {
      max-width: 1400px; margin: 0 auto 4rem;
      padding: 1rem; columns: 4 180px; column-gap: 10px;
    }
    #gallery.cols-2 { columns: 2 320px; }
    #gallery.cols-3 { columns: 3 220px; }
    #gallery.cols-4 { columns: 4 180px; }
    #gallery.cols-5 { columns: 5 150px; }

    .card {
      break-inside: avoid; margin-bottom: 10px;
      border-radius: 12px; overflow: hidden;
      position: relative; cursor: pointer;
      background: var(--surface);
      box-shadow: 0 2px 10px rgba(0,0,0,.4);
      transition: transform .2s, box-shadow .2s;
    }
    @media (hover: hover) {
      .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.6); }
      .card:hover .card-overlay { opacity: 1; }
      .card-overlay { opacity: 0; }
    }
    .card img { display: block; width: 100%; height: auto; opacity: 0; transition: opacity .4s; }
    .card img.loaded { opacity: 1; }
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.8) 0%, transparent 50%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: .75rem; transition: opacity .2s; opacity: .5;
    }
    .card-name { font-size: .72rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 댓글 뱃지 */
    .card-badge {
      position: absolute; top: .5rem; right: .5rem;
      background: rgba(0,0,0,.65); color: #fff;
      font-size: .68rem; padding: .2rem .5rem;
      border-radius: 999px; display: none; align-items: center; gap: .3rem;
    }
    .card-badge.visible { display: flex; }

    /* ── 라이트박스 ── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.88); backdrop-filter: blur(12px);
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }

    #lb-container {
      display: flex;
      width: min(92vw, 1100px);
      height: min(90vh, 760px);
      background: var(--surface);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 30px 100px rgba(0,0,0,.7);
      animation: pop .22s ease;
    }
    @keyframes pop { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* 이미지 영역 */
    #lb-image-wrap {
      flex: 1; position: relative;
      display: flex; align-items: center; justify-content: center;
      background: #08080d; min-width: 0;
    }
    #lb-img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      user-select: none; pointer-events: none;
      transition: filter .25s;
    }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.12); border: none; color: #fff;
      width: 44px; height: 44px; border-radius: 50%; font-size: 1.3rem;
      cursor: pointer; display: grid; place-items: center;
      transition: background .15s; -webkit-tap-highlight-color: transparent;
    }
    .lb-nav:hover { background: rgba(255,255,255,.26); }
    #lb-prev { left: .8rem; }
    #lb-next { right: .8rem; }

    /* 댓글 패널 */
    #lb-panel {
      width: 320px; min-width: 280px;
      display: flex; flex-direction: column;
      border-left: 1px solid var(--border);
    }
    #lb-panel-header {
      padding: 1rem 1.1rem .8rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: .6rem;
    }
    #lb-title {
      font-size: .82rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    #lb-counter { font-size: .78rem; color: var(--muted); white-space: nowrap; }

    #lb-close {
      background: rgba(255,255,255,.1); border: none; color: var(--text);
      width: 28px; height: 28px; border-radius: 50%; font-size: .85rem;
      cursor: pointer; display: grid; place-items: center; flex-shrink: 0;
    }
    #lb-close:hover { background: rgba(255,255,255,.2); }

    /* 댓글 목록 */
    #lb-comments {
      flex: 1; overflow-y: auto; padding: .8rem 1rem;
      display: flex; flex-direction: column; gap: .75rem;
    }
    #lb-comments::-webkit-scrollbar { width: 4px; }
    #lb-comments::-webkit-scrollbar-track { background: transparent; }
    #lb-comments::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .comment-empty { color: var(--muted); font-size: .82rem; text-align: center; margin: auto; }

    .comment-loading { text-align: center; margin: auto; }
    .comment-loading .spinner { width: 24px; height: 24px; border-width: 2px; }

    .comment-item {
      display: flex; gap: .6rem;
    }
    .comment-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid; place-items: center;
      font-size: .75rem; font-weight: 700; color: #fff;
    }
    .comment-body { flex: 1; min-width: 0; }
    .comment-name { font-size: .78rem; font-weight: 600; color: var(--accent); margin-bottom: .2rem; }
    .comment-text { font-size: .82rem; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
    .comment-time { font-size: .68rem; color: var(--muted); margin-top: .25rem; }

    /* 입력 영역 */
    #lb-input-area {
      padding: .8rem 1rem;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: .5rem;
    }
    #lb-name {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: .45rem .7rem; font-size: .82rem;
      outline: none; transition: border-color .15s;
    }
    #lb-name:focus { border-color: var(--accent); }
    #lb-msg {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: .5rem .7rem; font-size: .82rem;
      resize: none; height: 72px; outline: none;
      transition: border-color .15s; font-family: inherit; line-height: 1.5;
    }
    #lb-msg:focus { border-color: var(--accent); }
    #lb-send {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 8px;
      padding: .55rem; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    #lb-send:hover { opacity: .85; }
    #lb-send:disabled { opacity: .4; cursor: default; }

    /* 모바일: 세로 레이아웃 */
    @media (max-width: 700px) {
      #lb-container {
        flex-direction: column;
        width: 100vw; height: 100dvh;
        border-radius: 0;
      }
      #lb-image-wrap { height: 42dvh; flex: none; }
      #lb-panel {
        width: 100%; border-left: none; border-top: 1px solid var(--border);
        flex: 1; min-height: 0;
      }
      .cols-btn { display: none; }
      #gallery { column-gap: 8px; }
      #gallery.cols-4 { columns: 2; }
      #gallery.cols-5 { columns: 3; }
      .card { margin-bottom: 8px; border-radius: 10px; }
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🐾</div>
  <h1>댕이♥몽이</h1>
  <span id="header-count"></span>
</header>

<div id="status">
  <div class="spinner"></div>
  <p>사진 불러오는 중...</p>
</div>

<div id="toolbar">
  <span id="count"></span>
  <div class="spacer"></div>
  <select class="sort-select" id="sort-select">
    <option value="original">기본순</option>
    <option value="name">이름순</option>
  </select>
  <div class="cols-btn">
    <button data-cols="2">2열</button>
    <button data-cols="3">3열</button>
    <button data-cols="4" class="active">4열</button>
    <button data-cols="5">5열</button>
  </div>
</div>

<div id="gallery" class="cols-4"></div>

<!-- 라이트박스 -->
<div id="lightbox">
  <div id="lb-container">

    <!-- 이미지 -->
    <div id="lb-image-wrap">
      <button class="lb-nav" id="lb-prev">‹</button>
      <img id="lb-img" src="" alt="" draggable="false" />
      <button class="lb-nav" id="lb-next">›</button>
    </div>

    <!-- 댓글 패널 -->
    <div id="lb-panel">
      <div id="lb-panel-header">
        <span id="lb-title"></span>
        <span id="lb-counter"></span>
        <button id="lb-close">✕</button>
      </div>
      <div id="lb-comments">
        <div class="comment-loading"><div class="spinner"></div></div>
      </div>
      <div id="lb-input-area">
        <input id="lb-name" type="text" placeholder="이름" maxlength="20" autocomplete="nickname" />
        <textarea id="lb-msg" placeholder="메시지를 남겨보세요 💬" maxlength="300"></textarea>
        <button id="lb-send">남기기</button>
      </div>
    </div>

  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     🔧 Firebase 설정 (본인 값으로 교체)
     console.firebase.google.com 에서 발급
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCo1Md6ZQiBdMA1NxqLF10wV7jNUY-wl1Q",
  authDomain: "imageviewer-7e92a.firebaseapp.com",
  projectId: "imageviewer-7e92a",
  storageBucket: "imageviewer-7e92a.firebasestorage.app",
  messagingSenderId: "409270087263",
  appId: "1:409270087263:web:3f9e1b317d1c05930775ea",
  measurementId: "G-5WK75MTMSE"
};
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

  firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.firestore();

  /* ── DOM ── */
  const gallery    = document.getElementById('gallery');
  const toolbar    = document.getElementById('toolbar');
  const statusEl   = document.getElementById('status');
  const countEl    = document.getElementById('count');
  const headerCnt  = document.getElementById('header-count');
  const lightbox   = document.getElementById('lightbox');
  const lbImg      = document.getElementById('lb-img');
  const lbTitle    = document.getElementById('lb-title');
  const lbCounter  = document.getElementById('lb-counter');
  const lbComments = document.getElementById('lb-comments');
  const lbName     = document.getElementById('lb-name');
  const lbMsg      = document.getElementById('lb-msg');
  const lbSend     = document.getElementById('lb-send');

  let photos   = [];
  let lbIndex  = 0;
  let unsubFn  = null;   // Firestore 리스너 해제 함수

  /* ── 사진 로드 ── */
  async function init() {
    try {
      const res = await fetch('photos.json');
      if (!res.ok) throw new Error();
      const list = await res.json();
      photos = list.map(name => ({ src: 'photos/' + name, thumb: 'thumbs/' + name, name }));
      statusEl.classList.add('hidden');
      renderGallery();
    } catch {
      statusEl.innerHTML = '<p style="color:#f76aa8">⚠ photos.json 파일이 없습니다.<br><small>make.bat 을 실행해 사진 목록을 생성하세요.</small></p>';
    }
  }

  function renderGallery() {
    const sort   = document.getElementById('sort-select').value;
    const sorted = [...photos];
    if (sort === 'name') sorted.sort((a,b) => a.name.localeCompare(b.name));

    gallery.innerHTML = '';
    sorted.forEach((img, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${img.thumb}" alt="${img.name}" loading="lazy" />
        <div class="card-overlay"><div class="card-name">${img.name}</div></div>
        <div class="card-badge" id="badge-${i}">💬 <span>0</span></div>`;
      card.querySelector('img').onload = e => e.target.classList.add('loaded');
      card.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(card);
      loadBadge(img.name, i);
    });

    const n = photos.length;
    countEl.textContent   = `사진 ${n}장`;
    headerCnt.textContent = `사진 ${n}장`;
    toolbar.classList.toggle('visible', n > 0);
  }

  function loadBadge(name, i) {
    db.collection('photos').doc(encodeKey(name)).collection('comments')
      .onSnapshot(snap => {
        const badge = document.getElementById('badge-' + i);
        if (!badge) return;
        if (snap.size > 0) {
          badge.querySelector('span').textContent = snap.size;
          badge.classList.add('visible');
        } else {
          badge.classList.remove('visible');
        }
      });
  }

  document.getElementById('sort-select').addEventListener('change', renderGallery);
  document.querySelectorAll('.cols-btn button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cols-btn button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      gallery.className = 'cols-' + btn.dataset.cols;
    });
  });

  /* ── 키 인코딩 (파일명 → Firestore 문서 ID) ── */
  function encodeKey(name) {
    return name.replace(/\//g, '__');
  }

  /* ── 라이트박스 ── */
  function openLightbox(i) {
    lbIndex = i;
    showLb();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    lbName.value = localStorage.getItem('lb-name') || '';
  }

  function closeLightbox() {
    if (unsubFn) { unsubFn(); unsubFn = null; }
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function showLb() {
    const img = photos[lbIndex];
    lbTitle.textContent   = img.name;
    lbCounter.textContent = `${lbIndex + 1} / ${photos.length}`;
    lbMsg.value = '';

    // 썸네일 먼저, 원본 로드 후 교체
    lbImg.src = img.thumb;
    lbImg.style.filter = 'blur(4px)';
    const full = new Image();
    full.onload = () => { lbImg.src = img.src; lbImg.style.filter = ''; };
    full.src = img.src;

    subscribeComments(img.name);
  }

  function subscribeComments(photoName) {
    if (unsubFn) { unsubFn(); unsubFn = null; }
    lbComments.innerHTML = '<div class="comment-loading"><div class="spinner"></div></div>';

    unsubFn = db.collection('photos').doc(encodeKey(photoName))
      .collection('comments')
      .orderBy('ts', 'asc')
      .onSnapshot(snap => {
        if (snap.empty) {
          lbComments.innerHTML = '<p class="comment-empty">아직 메시지가 없어요.<br>첫 메시지를 남겨보세요 🐾</p>';
          return;
        }
        lbComments.innerHTML = '';
        snap.forEach(doc => {
          const d = doc.data();
          const el = document.createElement('div');
          el.className = 'comment-item';
          el.innerHTML = `
            <div class="comment-avatar">${(d.name || '?')[0].toUpperCase()}</div>
            <div class="comment-body">
              <div class="comment-name">${esc(d.name)}</div>
              <div class="comment-text">${esc(d.text)}</div>
              <div class="comment-time">${timeAgo(d.ts?.toDate())}</div>
            </div>`;
          lbComments.appendChild(el);
        });
        lbComments.scrollTop = lbComments.scrollHeight;
      });
  }

  /* ── 댓글 전송 ── */
  async function sendComment() {
    const name = lbName.value.trim();
    const text = lbMsg.value.trim();
    if (!name) { lbName.focus(); return; }
    if (!text) { lbMsg.focus(); return; }

    lbSend.disabled = true;
    localStorage.setItem('lb-name', name);

    try {
      await db.collection('photos').doc(encodeKey(photos[lbIndex].name))
        .collection('comments').add({ name, text, ts: firebase.firestore.FieldValue.serverTimestamp() });
      lbMsg.value = '';
    } catch (e) {
      alert('전송 실패: Firebase 설정을 확인하세요.');
    } finally {
      lbSend.disabled = false;
      lbMsg.focus();
    }
  }

  lbSend.addEventListener('click', sendComment);
  lbMsg.addEventListener('keydown', e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendComment(); });

  /* ── 네비게이션 ── */
  function prevPhoto() { lbIndex = (lbIndex - 1 + photos.length) % photos.length; showLb(); }
  function nextPhoto() { lbIndex = (lbIndex + 1) % photos.length; showLb(); }

  document.getElementById('lb-prev').onclick  = prevPhoto;
  document.getElementById('lb-next').onclick  = nextPhoto;
  document.getElementById('lb-close').onclick = closeLightbox;

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  prevPhoto();
    if (e.key === 'ArrowRight') nextPhoto();
    if (e.key === 'Escape')     closeLightbox();
  });

  // 이미지 영역만 스와이프 (댓글 패널 스크롤 방해 안 함)
  const imgWrap = document.getElementById('lb-image-wrap');
  let tsX = 0;
  imgWrap.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; }, { passive: true });
  imgWrap.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - tsX;
    if (Math.abs(dx) < 40) return;
    dx < 0 ? nextPhoto() : prevPhoto();
  });

  /* ── 유틸 ── */
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function timeAgo(date) {
    if (!date) return '';
    const sec = Math.floor((Date.now() - date) / 1000);
    if (sec < 60)   return '방금 전';
    if (sec < 3600) return `${Math.floor(sec/60)}분 전`;
    if (sec < 86400) return `${Math.floor(sec/3600)}시간 전`;
    return date.toLocaleDateString('ko-KR');
  }

  init();
</script>
</body>
</html>
