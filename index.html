<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>댕이♥몽이</title>
  <meta property="og:title" content="댕이♥몽이" />
  <meta property="og:description" content="댕이♥몽이" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="logo">🐾</div>
  <h1>댕이♥몽이</h1>
  <span id="header-count"></span>
</header>

<div id="status">
  <div class="spinner"></div>
  <p>사진 불러오는 중...</p>
</div>

<div id="toolbar">
  <span id="count"></span>
  <div class="spacer"></div>
  <select class="sort-select" id="sort-select">
    <option value="original">기본순</option>
    <option value="name">이름순</option>
  </select>
  <div class="cols-btn">
    <button data-cols="2">2열</button>
    <button data-cols="3">3열</button>
    <button data-cols="4" class="active">4열</button>
    <button data-cols="5">5열</button>
  </div>
</div>

<div id="gallery" class="cols-4"></div>

<!-- 라이트박스 -->
<div id="lightbox">
  <div id="lb-container">

    <!-- 이미지 -->
    <div id="lb-image-wrap">
      <button class="lb-nav" id="lb-prev">‹</button>
      <img id="lb-img" src="" alt="" draggable="false" />
      <button class="lb-nav" id="lb-next">›</button>
    </div>

    <!-- 댓글 패널 -->
    <div id="lb-panel">
      <div id="lb-panel-header">
        <span id="lb-title"></span>
        <span id="lb-counter"></span>
        <button id="lb-close">✕</button>
      </div>
      <div id="lb-comments">
        <div class="comment-loading"><div class="spinner"></div></div>
      </div>
      <div id="lb-input-area">
        <input id="lb-name" type="text" placeholder="이름" maxlength="20" autocomplete="nickname" />
        <textarea id="lb-msg" placeholder="메시지를 남겨보세요 💬" maxlength="300"></textarea>
        <button id="lb-send">남기기</button>
      </div>
    </div>

  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
