<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>댕이♥몽이</title>
  <meta property="og:title" content="댕이♥몽이" />
  <meta property="og:description" content="댕이♥몽이" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2e2e42;
      --accent: #7c6af7;
      --accent2: #f76aa8;
      --text: #e8e8f0;
      --muted: #7878a0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 1.2rem 1.5rem;
      display: flex; align-items: center; gap: .8rem;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,19,.9);
      backdrop-filter: blur(12px);
    }
    .logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 1rem; flex-shrink: 0;
    }
    header h1 { font-size: 1.15rem; font-weight: 700; }
    #header-count { color: var(--muted); font-size: .8rem; margin-left: auto; }

    /* ── 로딩 / 에러 상태 ── */
    #status {
      text-align: center; padding: 5rem 2rem; color: var(--muted);
    }
    #status.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 툴바 ── */
    #toolbar {
      display: none;
      max-width: 1400px; margin: 0 auto;
      padding: .7rem 1.2rem;
      align-items: center; gap: .6rem; flex-wrap: wrap;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 57px; z-index: 90;
    }
    #toolbar.visible { display: flex; }
    #count { color: var(--muted); font-size: .82rem; }
    .spacer { flex: 1; }

    .sort-select {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: .4rem .7rem; font-size: .82rem; cursor: pointer; min-height: 36px;
    }
    .cols-btn { display: flex; gap: .35rem; }
    .cols-btn button {
      background: var(--bg); color: var(--muted);
      border: 1px solid var(--border); border-radius: 6px;
      padding: .35rem .65rem; font-size: .78rem;
      cursor: pointer; transition: all .15s; min-height: 36px;
    }
    .cols-btn button.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* ── 갤러리 ── */
    #gallery {
      max-width: 1400px; margin: 0 auto 4rem;
      padding: 1rem; columns: 4 180px; column-gap: 10px;
    }
    #gallery.cols-2 { columns: 2 320px; }
    #gallery.cols-3 { columns: 3 220px; }
    #gallery.cols-4 { columns: 4 180px; }
    #gallery.cols-5 { columns: 5 150px; }

    .card {
      break-inside: avoid; margin-bottom: 10px;
      border-radius: 12px; overflow: hidden;
      position: relative; cursor: pointer;
      background: var(--surface);
      box-shadow: 0 2px 10px rgba(0,0,0,.4);
      transition: transform .2s, box-shadow .2s;
    }
    @media (hover: hover) {
      .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.6); }
      .card:hover .card-overlay { opacity: 1; }
      .card-overlay { opacity: 0; }
    }

    .card img { display: block; width: 100%; height: auto; opacity: 0; transition: opacity .4s; }
    .card img.loaded { opacity: 1; }

    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.8) 0%, transparent 50%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: .75rem; transition: opacity .2s; opacity: .5;
    }
    .card-name { font-size: .72rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── 라이트박스 ── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.95); backdrop-filter: blur(10px);
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }

    #lb-img {
      max-width: 92vw; max-height: 84vh;
      border-radius: 10px; object-fit: contain;
      box-shadow: 0 20px 80px rgba(0,0,0,.8);
      animation: pop .22s ease;
      user-select: none; pointer-events: none;
      transition: filter .25s;
    }
    @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .lb-btn {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.15); border: none; color: #fff;
      width: 48px; height: 48px; border-radius: 50%; font-size: 1.4rem;
      cursor: pointer; display: grid; place-items: center;
      transition: background .15s; -webkit-tap-highlight-color: transparent;
    }
    .lb-btn:hover { background: rgba(255,255,255,.28); }
    #lb-prev { left: 1rem; }
    #lb-next { right: 1rem; }

    #lb-close {
      position: fixed; top: 1rem; right: 1rem;
      background: rgba(255,255,255,.15); border: none; color: #fff;
      width: 44px; height: 44px; border-radius: 50%; font-size: 1.1rem;
      cursor: pointer; display: grid; place-items: center;
      -webkit-tap-highlight-color: transparent;
    }
    #lb-info {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.7); color: #fff;
      padding: .45rem 1.1rem; border-radius: 999px;
      font-size: .78rem; white-space: nowrap;
      max-width: 90vw; overflow: hidden; text-overflow: ellipsis;
    }

    @media (max-width: 480px) {
      .cols-btn { display: none; }
      #gallery { column-gap: 8px; }
      #gallery.cols-4 { columns: 2; }
      #gallery.cols-5 { columns: 3; }
      .card { margin-bottom: 8px; border-radius: 10px; }
      #lb-prev { left: .4rem; } #lb-next { right: .4rem; }
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🖼</div>
  <h1>댕이♥몽이</h1>
  <span id="header-count"></span>
</header>

<div id="status">
  <div class="spinner"></div>
  <p>사진 불러오는 중...</p>
</div>

<div id="toolbar">
  <span id="count"></span>
  <div class="spacer"></div>
  <select class="sort-select" id="sort-select">
    <option value="original">기본순</option>
    <option value="name">이름순</option>
  </select>
  <div class="cols-btn">
    <button data-cols="2">2열</button>
    <button data-cols="3">3열</button>
    <button data-cols="4" class="active">4열</button>
    <button data-cols="5">5열</button>
  </div>
</div>

<div id="gallery" class="cols-4"></div>

<div id="lightbox">
  <button id="lb-close">✕</button>
  <button class="lb-btn" id="lb-prev">‹</button>
  <img id="lb-img" src="" alt="" draggable="false" />
  <button class="lb-btn" id="lb-next">›</button>
  <div id="lb-info"></div>
</div>

<script>
  const gallery   = document.getElementById('gallery');
  const toolbar   = document.getElementById('toolbar');
  const statusEl  = document.getElementById('status');
  const countEl   = document.getElementById('count');
  const headerCnt = document.getElementById('header-count');
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lb-img');
  const lbInfo    = document.getElementById('lb-info');

  let photos  = [];   // [{ src, name }]
  let lbIndex = 0;

  /* ── 사진 목록 로드 ── */
  async function init() {
    try {
      const res = await fetch('photos.json');
      if (!res.ok) throw new Error();
      const list = await res.json();   // string[] of filenames
      photos = list.map(name => ({ src: 'photos/' + name, thumb: 'thumbs/' + name, name }));
      statusEl.classList.add('hidden');
      renderGallery();
    } catch {
      statusEl.innerHTML = '<p style="color:#f76aa8">⚠ photos.json 파일이 없습니다.<br><small>make.bat 을 실행해 사진 목록을 생성하세요.</small></p>';
    }
  }

  function renderGallery() {
    const sort   = document.getElementById('sort-select').value;
    const sorted = [...photos];
    if (sort === 'name') sorted.sort((a,b) => a.name.localeCompare(b.name));

    gallery.innerHTML = '';
    sorted.forEach((img, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${img.thumb}" alt="${img.name}" loading="lazy" />
        <div class="card-overlay"><div class="card-name">${img.name}</div></div>`;
      card.querySelector('img').onload = e => e.target.classList.add('loaded');
      card.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(card);
    });

    const n = photos.length;
    countEl.textContent   = `사진 ${n}장`;
    headerCnt.textContent = `사진 ${n}장`;
    toolbar.classList.toggle('visible', n > 0);
  }

  document.getElementById('sort-select').addEventListener('change', renderGallery);

  document.querySelectorAll('.cols-btn button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cols-btn button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      gallery.className = 'cols-' + btn.dataset.cols;
    });
  });

  /* ── 라이트박스 ── */
  function openLightbox(i) {
    lbIndex = i; showLb();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }
  function showLb() {
    const img = photos[lbIndex];
    lbInfo.textContent = `${lbIndex + 1} / ${photos.length}  ·  ${img.name}`;
    // 썸네일 먼저 표시 후 원본으로 교체
    lbImg.src = img.thumb;
    lbImg.style.filter = 'blur(4px)';
    const full = new Image();
    full.onload = () => { lbImg.src = img.src; lbImg.style.filter = ''; };
    full.src = img.src;
  }

  document.getElementById('lb-prev').onclick  = () => { lbIndex = (lbIndex - 1 + photos.length) % photos.length; showLb(); };
  document.getElementById('lb-next').onclick  = () => { lbIndex = (lbIndex + 1) % photos.length; showLb(); };
  document.getElementById('lb-close').onclick = closeLightbox;
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + photos.length) % photos.length; showLb(); }
    if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % photos.length; showLb(); }
    if (e.key === 'Escape') closeLightbox();
  });

  /* ── 터치 스와이프 ── */
  let tsX = 0;
  lightbox.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; }, { passive: true });
  lightbox.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - tsX;
    if (Math.abs(dx) < 40) return;
    lbIndex = dx < 0
      ? (lbIndex + 1) % photos.length
      : (lbIndex - 1 + photos.length) % photos.length;
    showLb();
  });

  init();
</script>
</body>
</html>
